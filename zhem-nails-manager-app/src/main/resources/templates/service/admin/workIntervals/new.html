<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Добавить новый интервал</title>
</head>
<body>
    <h1>Добавить новый интервал</h1>
    <form method="post" data-th-action="@{/admin/workintervals/create}">
        <label>
            Дата:
            <input type="date" name="date" data-th-value="${payload?.date}">
            <span data-th-text="${errors?.containsKey('date')} ? ${errors.get('date')}"></span>
        </label><br><br>

        <label>
            Время:
            <input type="time" name="startTime" data-th-value="${payload?.startTime}">
            <span data-th-text="${errors?.containsKey('startTime')} ? ${errors.get('startTime')}"></span>
        </label><br><br>

        <input type="submit" value="Добавить">
    </form>
</body>
</html>
